spec_version: 1
name: bugforge
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "OpenEnv debugging environment for interactive Python code repair"
tasks:
  - id: 1
    difficulty: easy
    description: "Fix arithmetic bug in single file"
  - id: 2
    difficulty: medium
    description: "Fix cross-file type mismatch bug"
  - id: 3
    difficulty: hard
    description: "Fix a missing fallback branch in coupon logic"
  - id: 4
    difficulty: medium
    description: "Fix a username normalization bug that leaves whitespace intact"
  - id: 5
    difficulty: hard
    description: "Fix shipping-zone logic that misclassifies west coast zip codes"
action_space:
  - run_tests
  - read_file
  - apply_patch
  - done
observation_space:
  - output
  - tests_passing
  - tests_total
  - files_read
  - steps_remaining
  - patches_applied
reward_range: [0.0, 1.0]
max_steps: 10
